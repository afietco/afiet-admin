# Kalite kapısı: üç ana dala giden PR'larda VE push'larda koşar (akış
# zaman zaman PR'sız terfi push'u kullanıyor — push tetikleyicisi olmadan
# CI hiç koşmuyordu). Deploy YAPMAZ — admin deploy'larını Vercel'in Git
# entegrasyonu yürütür (main→Production, development/staging→Preview).
name: ci

on:
  push:
    branches: [development, staging, main]
  pull_request:
    branches: [development, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Tip kontrolü
        run: npm run typecheck

      - name: Build
        run: npm run build
